# Nginx config for GoClaw WebChat docker-compose example
# Serves static widget files and proxies /ws to the backend proxy server

server {
    listen 80;

    # Serve widget dist files
    location /dist/ {
        alias /usr/share/nginx/html/dist/;
    }

    # Serve example HTML
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Proxy WebSocket connections to the backend
    location /ws {
        proxy_pass http://proxy:3100/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }
}
