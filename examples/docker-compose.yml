# Full-stack GoClaw WebChat: proxy + static file server for the widget
#
# Usage:
#   1. Copy server/.env.example to server/.env and configure it
#   2. docker compose -f examples/docker-compose.yml up
#   3. Open http://localhost:8080 in your browser
#
# The proxy server runs on :3100 (internal), and nginx serves
# the widget files on :8080 with /ws proxied to the backend.

services:
  # WebSocket proxy — keeps auth token server-side
  proxy:
    build:
      context: ../server
      dockerfile: ../examples/Dockerfile.proxy
    env_file: ../server/.env
    expose:
      - "3100"
    restart: unless-stopped

  # Static file server + reverse proxy
  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ../dist:/usr/share/nginx/html/dist:ro
      - ./proxy-mode.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - proxy
    restart: unless-stopped
